data_processing:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  handle_imbalance: true
  imbalance_strategy: "smote"

training:
  random_state: 42
  cv_folds: 5
  scoring_metric: "roc_auc"
  n_jobs: -1

models:
  logistic_regression:
    C: [0.01, 0.1, 1, 10]
    solver: ["lbfgs", "liblinear"]
    max_iter: [200, 500]

  random_forest:
    n_estimators: [100, 200]
    max_depth: [5, 10, 20, null]
    min_samples_split: [2, 5]
    class_weight: ["balanced"]

  gradient_boosting:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1, 0.2]
    max_depth: [3, 5, 7]
    subsample: [0.8, 1.0]

  xgboost:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [3, 5, 7]
    scale_pos_weight: [2.7]

  lightgbm:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    num_leaves: [31, 50]
    class_weight: ["balanced"]