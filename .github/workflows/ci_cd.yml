name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install xgboost lightgbm kaggle
          pip install -e .

      - name: Create required directories
        run: |
          mkdir -p logs artifacts data/raw data/processed
          mkdir -p data/new_incoming reports mlflow

      - name: Download dataset from Kaggle
        run: |
          kaggle datasets download -d blastchar/telco-customer-churn \
            -p data/raw --unzip
          mv data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv \
            data/raw/churn_raw.csv
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      - name: Train model to generate artifacts
        run: |
          python test_phase4.py
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow/mlflow.db
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}