name: Model Retraining Pipeline

on:
  schedule:
    # Every Sunday at 2:00 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    # Also allows manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install xgboost lightgbm
          pip install -e .

      - name: Create required directories
        run: |
          mkdir -p logs artifacts data/raw data/processed
          mkdir -p data/new_incoming reports mlflow

      - name: Download dataset from Kaggle
        run: |
          pip install kaggle
          kaggle datasets download -d blastchar/telco-customer-churn \
            -p data/raw --unzip
          mv data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv \
            data/raw/churn_raw.csv
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      - name: Append new incoming data to training data
        run: |
          python -c "
          import os
          import pandas as pd

          new_data_path = 'data/new_incoming/new_data.csv'
          train_path    = 'data/processed/train.csv'

          if os.path.exists(new_data_path):
              new_df   = pd.read_csv(new_data_path)
              if os.path.exists(train_path):
                  train_df = pd.read_csv(train_path)
                  combined = pd.concat([train_df, new_df], ignore_index=True)
                  combined.to_csv(train_path, index=False)
                  print(f'Appended {len(new_df)} new rows to train.csv')
                  print(f'New train size: {len(combined)}')
              # Clear new_data.csv after appending
              open(new_data_path, 'w').close()
              print('new_data.csv cleared')
          else:
              print('No new data found — skipping append')
          "

      - name: Run full training pipeline
        run: |
          python -c "
          from src.data.data_ingestion import DataIngestion
          from src.data.data_splitting import DataSplitting
          from src.features.feature_engineering import FeatureEngineering
          from src.features.data_transformation import DataTransformation
          from src.models.model_training import ModelTraining
          from src.models.model_tuning import ModelTuning

          ingestion = DataIngestion()
          df = ingestion.load_data()

          splitting = DataSplitting()
          train, test, val = splitting.split(df)

          fe = FeatureEngineering()
          train = fe.engineer(train)
          val   = fe.engineer(val)

          dt = DataTransformation()
          X_train, y_train, transformer, le = dt.fit_transform(train)
          X_val,   y_val   = dt.transform_only(val, transformer)

          trainer = ModelTraining()
          results = trainer.train_all(X_train, y_train, X_val, y_val)
          best_name, best_model = trainer.get_best_model(results)

          tuner = ModelTuning()
          tuner.tune(best_model, best_name, X_train, y_train, X_val, y_val)

          print(f'Retraining complete! Best model: {best_name}')
          "
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow/mlflow.db
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: model-artifacts
          path: artifacts/